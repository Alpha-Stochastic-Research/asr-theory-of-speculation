name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  MPLBACKEND: Agg

jobs:
  test:
    name: Test package and reproduce figures
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install package with development dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Verify public package import
        run: |
          python - <<'PY'
          from asr.models import bachelier

          print("ASR Bachelier package version:", bachelier.__version__)

          price = bachelier.call_price(
              initial_price=100.0,
              strike=100.0,
              volatility=2.0,
              maturity=1.0,
          )

          print("Bachelier ATM call price:", price)
          PY

      - name: Run tests
        run: |
          pytest -q

      - name: Reproduce Brownian motion figure
        run: |
          python src/brownian_motion.py

      - name: Reproduce option pricing figure
        run: |
          python src/option_pricing.py

      - name: Check generated figures
        run: |
          test -f figures/fig1_random_walk_martingale.png
          test -f figures/fig2_option_pricing.png

      - name: Upload generated figures
        uses: actions/upload-artifact@v4
        with:
          name: bachelier-generated-figures
          path: |
            figures/fig1_random_walk_martingale.png
            figures/fig2_option_pricing.png
