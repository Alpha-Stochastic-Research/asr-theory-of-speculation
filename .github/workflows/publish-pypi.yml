name: Publish package to PyPI

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    name: Test, build, and validate distributions
    runs-on: ubuntu-latest

    env:
      MPLBACKEND: Agg

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Install package and development dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest -q

      - name: Verify public namespace and version
        run: |
          python -c "
          from asr.models import bachelier
          assert bachelier.__version__ == '1.1.0'
          print('ASR Bachelier version:', bachelier.__version__)
          "

      - name: Verify option-pricing calculation
        run: |
          python -c "
          from asr.models import bachelier

          price = bachelier.call_price(
              initial_price=100.0,
              strike=100.0,
              volatility=2.0,
              maturity=1.0,
          )

          assert price > 0.0
          print('Bachelier ATM call price:', price)
          "

      - name: Run Brownian motion reproduction
        run: |
          python src/brownian_motion.py

      - name: Run option-pricing reproduction
        run: |
          python src/option_pricing.py

      - name: Build wheel and source distribution
        run: |
          python -m build

      - name: Validate distributions
        run: |
          python -m twine check dist/*

      - name: Store distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distributions to PyPI
    needs:
      - build

    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/asr-theory-of-speculation

    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
