name: Python CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      MPLBACKEND: Agg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Run Brownian-motion reconstruction
        run: python src/brownian_motion.py

      - name: Run option-pricing reconstruction
        run: python src/option_pricing.py

      - name: Verify generated figures
        run: |
          test -f figures/fig1_random_walk_martingale.png
          test -f figures/fig2_option_pricing_revised.png
